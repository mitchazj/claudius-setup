name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          find . -name '*.sh' -print0 | xargs -0 shellcheck
      - name: ansible-lint
        run: |
          pipx install ansible-lint
          # ansible-lint's venv only has ansible-core; add full ansible for the
          # community.general / ansible.posix collections our roles use
          pipx inject ansible-lint ansible
          cd ansible && ansible-lint

  converge:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: bootstrap from zero
        run: ./bootstrap.sh --local "$PWD" --ci --user runner

      - name: verify
        run: sudo TARGET_USER=runner ./test/verify.sh --ci

      - name: idempotence (second run must change nothing)
        run: |
          cd ansible
          ansible-playbook playbook.yml --skip-tags firewall,never-ci \
            -e target_user=runner -e ci_mode=true | tee /tmp/idem.log
          grep -E 'changed=0.*failed=0' /tmp/idem.log

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      # run the binary directly over the FULL history — gitleaks-action derives
      # a commit range from the push event, which breaks on a repo's first push
      # (root commit has no parent) and silently narrows later scans
      - name: gitleaks (full history)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git . --redact --verbose
      - name: vault files must be encrypted
        run: |
          if [ -f ansible/vault/secrets.yml ]; then
            head -1 ansible/vault/secrets.yml | grep -q '^\$ANSIBLE_VAULT;' \
              || { echo "ansible/vault/secrets.yml is NOT encrypted!"; exit 1; }
          fi
