---
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Firewall — allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH
  tags: [firewall]

- name: Firewall — allow everything on the tailscale interface
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in
  tags: [firewall]

- name: Firewall — enable, default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: enable_firewall
  tags: [firewall]
