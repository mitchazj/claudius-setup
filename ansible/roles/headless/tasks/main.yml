---
# Only ever moves TOWARD headless. Cloud servers are already multi-user.target
# and have no desktop — auto-forcing graphical.target back on would break them.
# To restore the desktop on the box: sudo systemctl set-default graphical.target
- name: Check current default systemd target
  ansible.builtin.command: systemctl get-default  # noqa: command-instead-of-module (no module reads the default target)
  register: headless_default_target
  changed_when: false
  when: not ci_mode

- name: Boot to multi-user.target (headless — no GNOME login screen)
  ansible.builtin.command: systemctl set-default multi-user.target  # noqa: command-instead-of-module
  when:
    - not ci_mode
    - headless
    - headless_default_target.stdout != "multi-user.target"
  changed_when: true
