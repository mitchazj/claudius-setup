---
- name: Ensure sudo-capable target user exists — {{ target_user }}
  ansible.builtin.user:
    name: "{{ target_user }}"
    shell: /bin/bash
    groups: sudo
    append: true

- name: Passwordless sudo (cloud servers — user has no password at all)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ target_user }}"
    content: "{{ target_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"
  when: passwordless_sudo

- name: Ensure authorized keys for {{ target_user }}
  ansible.posix.authorized_key:
    user: "{{ target_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ authorized_pubkeys }}"

- name: Check that at least one authorized key actually exists
  ansible.builtin.stat:
    path: "/home/{{ target_user }}/.ssh/authorized_keys"
  register: authkeys_stat

- name: Ensure sshd privilege separation dir exists (sshd -T validation needs it)
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    mode: "0755"

# 10- prefix: sshd uses the FIRST value it reads, and cloud images ship
# 50-cloud-init.conf with PasswordAuthentication yes — we must sort earlier.
- name: Harden sshd (key-only auth) — only when a key is in place
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-claudius-setup.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
    mode: "0644"
    validate: "sshd -T -f %s"
  when:
    - harden_ssh
    - authkeys_stat.stat.exists
    - authkeys_stat.stat.size > 0
  notify: Restart sshd

- name: Ensure sshd is enabled and running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
  # GitHub Actions runners manage ssh differently; not worth fighting
  when: not ci_mode
